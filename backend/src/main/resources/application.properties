# ===================================================================
# SPRING BOOT CONFIGURATION
# ===================================================================
spring.application.name=backend

# Import external environment variables from .env.properties
spring.config.import=optional:file:.env.properties,optional:file:../.env.properties

# Active profiles
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===================================================================
# DATASOURCE & JPA CONFIGURATION (PostgreSQL)
# ===================================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# JPA CONFIGURATION
# ===================================================================
# Hibernate update: allows JPA to manage the schema by updating it
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Hikari Connection Pool settings
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=3

# ===================================================================
# SECURITY & OAUTH2 CONFIGURATION
# ===================================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# ===================================================================
# APPLICATION CUSTOM CONFIGURATION
# ===================================================================
# JWT Configuration
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:7200000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
app.jwt.cookie-secure=${COOKIE_SECURE:false}

# Google OAuth2 Client Id (For API usage/Token verification)
app.google.client-id=${GOOGLE_CLIENT_ID}

# SMS OTP Configuration
app.sms.api-key=${SMS_API_KEY}
app.sms.sender=${SMS_SENDER:ClassManager}

# CORS Configuration
app.cors.allowed-origins=${ALLOWED_ORIGINS}

# Timezone Configuration
app.timezone=${APP_TIMEZONE:Asia/Ho_Chi_Minh}

# ===================================================================
# SWAGGER / OPENAPI CONFIGURATION
# ===================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# ===================================================================
# AI PROVIDERS CONFIGURATION (Gemini & OpenAI)
# ===================================================================
ai.gemini.keys=${GEMINI_API_KEYS:}
ai.openai.keys=${OPENAI_API_KEYS:}


